version: "3.8"

services:
  # Load Balancer
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app-1
      - app-2
      - app-3
      - app-4
    networks:
      - grading-network
    restart: unless-stopped

  # Application instances for scaling
  app-1:
    build: .
    environment:
      - NODE_ENV=production
      - PORT=3001
      - INSTANCE=app-1
    depends_on:
      - redis
    networks:
      - grading-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  app-2:
    build: .
    environment:
      - NODE_ENV=production
      - PORT=3002
      - INSTANCE=app-2
    depends_on:
      - redis
    networks:
      - grading-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  app-3:
    build: .
    environment:
      - NODE_ENV=production
      - PORT=3003
      - INSTANCE=app-3
    depends_on:
      - redis
    networks:
      - grading-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  app-4:
    build: .
    environment:
      - NODE_ENV=production
      - PORT=3004
      - INSTANCE=app-4
    depends_on:
      - redis
    networks:
      - grading-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Redis for caching and session management
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - grading-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - redis-data:/data

  # PostgreSQL for persistent storage (optional)
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=grading_db
      - POSTGRES_USER=grading_user
      - POSTGRES_PASSWORD=secure_password
    ports:
      - "5432:5432"
    networks:
      - grading-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grading_user"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # Monitoring with Prometheus (optional)
  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - grading-network
    restart: unless-stopped

networks:
  grading-network:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
  prometheus-data:
