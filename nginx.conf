user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 10000;
  use epoll;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  # Performance optimizations
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 1M;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml text/javascript 
             application/json application/javascript application/xml+rss 
             application/atom+xml image/svg+xml;

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
  limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;

  # Upstream backend servers
  upstream backend {
    least_conn;
    server app-1:3001 max_fails=3 fail_timeout=30s;
    server app-2:3002 max_fails=3 fail_timeout=30s;
    server app-3:3003 max_fails=3 fail_timeout=30s;
    server app-4:3004 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  # Cache settings
  proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m max_size=1g 
                   inactive=60m use_temp_path=off;

  # HTTP Server (redirect to HTTPS)
  server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # HTTPS Server
  server {
    listen 443 ssl http2;
    server_name _;

    # SSL Configuration
    ssl_certificate /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Cache static assets
    location ~* \.(js|css|json|woff|woff2|ttf|svg|jpg|jpeg|png|gif|ico)$ {
      proxy_pass http://backend;
      proxy_cache api_cache;
      proxy_cache_valid 200 7d;
      proxy_cache_key "$scheme$request_method$host$request_uri";
      add_header X-Cache-Status $upstream_cache_status;
      expires 7d;
    }

    # Service Worker
    location = /sw.js {
      proxy_pass http://backend;
      proxy_cache api_cache;
      proxy_cache_valid 200 1d;
      add_header Cache-Control "public, max-age=86400";
    }

    # Manifest
    location = /manifest.json {
      proxy_pass http://backend;
      proxy_cache api_cache;
      proxy_cache_valid 200 1d;
      add_header Cache-Control "public, max-age=86400";
    }

    # API endpoints
    location /api/ {
      limit_req zone=api burst=200 nodelay;
      
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
      
      # Cache API responses
      proxy_cache api_cache;
      proxy_cache_valid 200 1m;
      proxy_cache_key "$scheme$request_method$host$request_uri$request_body";
      proxy_cache_bypass $http_pragma $http_authorization;
      add_header X-Cache-Status $upstream_cache_status;
      
      # Timeouts
      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
    }

    # Health check endpoint
    location /health {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      access_log off;
    }

    # Root and index
    location / {
      limit_req zone=general burst=20 nodelay;
      
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_redirect off;
      
      # Timeouts
      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
    }

    # Deny access to sensitive files
    location ~ /\. {
      deny all;
      access_log off;
      log_not_found off;
    }
  }
}
